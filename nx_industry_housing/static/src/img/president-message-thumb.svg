  <rect x="52" y="162" width="152" height="5" rx="2" fill="#ddd"/>
  <rect x="60" y="174" width="136" height="5" rx="2" fill="#ddd"/>
  <rect x="68" y="186" width="120" height="5" rx="2" fill="#ddd"/>
  <!-- Divider -->
