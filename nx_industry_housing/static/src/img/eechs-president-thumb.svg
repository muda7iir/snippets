<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 356" width="256" height="356">
  <!-- Panel bg -->
  <rect width="256" height="356" rx="12" fill="#f5f5f5"/>
  <!-- Card -->
  <rect x="33" y="65" width="190" height="255" rx="16" fill="#ffffff" stroke="#006633" stroke-width="2.5"/>
  <!-- Avatar gold ring -->
  <circle cx="128" cy="65" r="30" fill="#B89A3D"/>
  <!-- Avatar inner -->
  <circle cx="128" cy="65" r="25" fill="#e0e0e0"/>
  <!-- Head -->
  <ellipse cx="128" cy="57" rx="8" ry="10" fill="#222"/>
  <!-- Shoulders -->
  <path d="M112 72 Q112 66 120 64 L128 70 L136 64 Q144 66 144 72 Q144 80 128 80 Q112 80 112 72Z" fill="#222"/>
  <!-- PRESIDENT label -->
  <rect x="95" y="108" width="66" height="6" rx="2" fill="#B89A3D"/>
  <!-- Name -->
  <rect x="62" y="122" width="132" height="10" rx="2" fill="#006633"/>
  <!-- Designation -->
  <rect x="82" y="140" width="92" height="5" rx="2" fill="#444"/>
  <!-- Message lines -->
  <rect x="56" y="158" width="144" height="4" rx="2" fill="#ddd"/>
  <rect x="64" y="168" width="128" height="4" rx="2" fill="#ddd"/>
  <rect x="72" y="178" width="112" height="4" rx="2" fill="#ddd"/>
  <!-- Divider -->
  <rect x="100" y="196" width="56" height="3" rx="1.5" fill="#B89A3D"/>
  <!-- Button -->
  <rect x="72" y="212" width="112" height="28" rx="7" fill="#006633" stroke="#B89A3D" stroke-width="2"/>
  <text x="128" y="230" text-anchor="middle" fill="#fff" font-size="8" font-weight="bold" font-family="Arial,sans-serif" letter-spacing="1">READ MESSAGE</text>
</svg>
